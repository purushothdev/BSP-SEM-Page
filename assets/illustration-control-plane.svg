<svg viewBox="0 0 420 280" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background shapes -->
    <rect x="5" y="125" width="155" height="140" rx="6" fill="white" opacity="0.6"/>

    <!-- Left panel - Controls -->
    <rect x="20" y="15" width="195" height="165" rx="8" fill="white" stroke="#D6E4ED" stroke-width="1.5"/>
    <!-- Panel header dots -->
    <circle cx="36" cy="30" r="4" fill="#E9142B"/>
    <circle cx="48" cy="30" r="4" fill="#F5A623"/>
    <circle cx="60" cy="30" r="4" fill="#4CD964"/>
    <!-- Slider 1 -->
    <line x1="36" y1="55" x2="200" y2="55" stroke="#E2EEF5" stroke-width="2"/>
    <circle cx="130" cy="55" r="5" fill="white" stroke="#0085FF" stroke-width="2"/>
    <!-- Slider 2 -->
    <line x1="36" y1="85" x2="200" y2="85" stroke="#E2EEF5" stroke-width="2"/>
    <circle cx="90" cy="85" r="5" fill="white" stroke="#0085FF" stroke-width="2"/>
    <!-- Slider 3 -->
    <line x1="36" y1="115" x2="200" y2="115" stroke="#E2EEF5" stroke-width="2"/>
    <circle cx="160" cy="115" r="5" fill="white" stroke="#0085FF" stroke-width="2"/>
    <!-- Toggle lines -->
    <line x1="36" y1="145" x2="120" y2="145" stroke="#E2EEF5" stroke-width="2"/>
    <line x1="36" y1="160" x2="100" y2="160" stroke="#E2EEF5" stroke-width="2"/>

    <!-- Right top panel - Bar Chart -->
    <rect x="230" y="15" width="175" height="115" rx="8" fill="white" stroke="#D6E4ED" stroke-width="1.5"/>
    <!-- Chart placeholder lines -->
    <line x1="250" y1="100" x2="390" y2="100" stroke="#E2EEF5" stroke-width="1"/>
    <line x1="250" y1="80" x2="390" y2="80" stroke="#E2EEF5" stroke-width="1" stroke-dasharray="3"/>
    <line x1="250" y1="60" x2="390" y2="60" stroke="#E2EEF5" stroke-width="1" stroke-dasharray="3"/>
    <!-- Bar chart bars -->
    <rect x="260" y="55" width="16" height="45" rx="2" fill="#0085FF"/>
    <rect x="280" y="45" width="16" height="55" rx="2" fill="#0085FF" opacity="0.7"/>
    <rect x="305" y="65" width="16" height="35" rx="2" fill="#0085FF"/>
    <rect x="325" y="50" width="16" height="50" rx="2" fill="#0085FF" opacity="0.7"/>
    <rect x="350" y="70" width="16" height="30" rx="2" fill="#0085FF"/>
    <rect x="370" y="60" width="16" height="40" rx="2" fill="#E9142B" opacity="0.6"/>

    <!-- Right bottom panel - Donut Chart -->
    <rect x="275" y="145" width="140" height="120" rx="8" fill="white" stroke="#D6E4ED" stroke-width="1.5"/>
    <!-- Dots -->
    <circle cx="295" cy="165" r="3" fill="#0085FF"/>
    <circle cx="305" cy="165" r="3" fill="#0085FF" opacity="0.5"/>
    <!-- Donut chart -->
    <circle cx="345" cy="215" r="30" fill="none" stroke="#E2EEF5" stroke-width="10"/>
    <circle cx="345" cy="215" r="30" fill="none" stroke="#0085FF" stroke-width="10" stroke-dasharray="45 143" stroke-dashoffset="0" transform="rotate(-90 345 215)"/>

    <!-- Central Gear Icons -->
    <!-- Large gear -->
    <circle cx="225" cy="215" r="35" fill="none" stroke="#A8D8F0" stroke-width="2"/>
    <circle cx="225" cy="215" r="22" fill="none" stroke="#A8D8F0" stroke-width="2"/>
    <!-- Gear teeth (large) -->
    <rect x="222" y="176" width="6" height="10" rx="2" fill="#A8D8F0"/>
    <rect x="222" y="244" width="6" height="10" rx="2" fill="#A8D8F0"/>
    <rect x="186" y="212" width="10" height="6" rx="2" fill="#A8D8F0"/>
    <rect x="254" y="212" width="10" height="6" rx="2" fill="#A8D8F0"/>
    <rect x="197" y="190" width="8" height="6" rx="2" fill="#A8D8F0" transform="rotate(-45 201 193)"/>
    <rect x="245" y="234" width="8" height="6" rx="2" fill="#A8D8F0" transform="rotate(-45 249 237)"/>
    <rect x="245" y="190" width="8" height="6" rx="2" fill="#A8D8F0" transform="rotate(45 249 193)"/>
    <rect x="197" y="234" width="8" height="6" rx="2" fill="#A8D8F0" transform="rotate(45 201 237)"/>

    <!-- Small gears -->
    <circle cx="355" cy="268" r="10" fill="none" stroke="#BCC8D4" stroke-width="1.5"/>
    <circle cx="355" cy="268" r="5" fill="none" stroke="#BCC8D4" stroke-width="1.5"/>
    <circle cx="370" cy="275" r="7" fill="none" stroke="#BCC8D4" stroke-width="1.5"/>
    <circle cx="370" cy="275" r="3.5" fill="none" stroke="#BCC8D4" stroke-width="1.5"/>
</svg>
